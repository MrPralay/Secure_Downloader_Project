<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal ALL Downloader X</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Balanced 3D Pyramid Mesh (4 Left, 4 Right) -->
    <div class="bg-engine">
        <!-- Left Wing -->
        <div class="pyramid-wrapper l1">
            <div class="pyramid-3d big">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper l2">
            <div class="pyramid-3d med-large">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper l3">
            <div class="pyramid-3d small">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper l4">
            <div class="pyramid-3d tiny">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <!-- Right Wing -->
        <div class="pyramid-wrapper r1">
            <div class="pyramid-3d big">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper r2">
            <div class="pyramid-3d med-large">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper r3">
            <div class="pyramid-3d small">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper r4">
            <div class="pyramid-3d tiny">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <!-- Vertical Anchors -->
        <div class="pyramid-wrapper t1">
            <div class="pyramid-3d big">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
        <div class="pyramid-wrapper b1">
            <div class="pyramid-3d med-large">
                <div class="face f1"></div>
                <div class="face f2"></div>
                <div class="face f3"></div>
            </div>
        </div>
    </div>





    <div class="container" id="mainContainer">
        <!-- PHASE 1: FETCH -->
        <div class="phase active" id="phase1">
            <h1>UNIVERSAL</h1>
            <p class="subtitle">Premium video extraction engine.</p>

            <div class="mode-toggle">
                <div class="mode-btn active" id="modeNormal" onclick="switchMode('normal')">Normal</div>
                <div class="mode-btn" id="modeVip" onclick="switchMode('vip')">VIP</div>
            </div>

            <div class="platform-grid" id="platformGrid">
                <div class="platform-icon selected" data-platform="youtube" title="YouTube">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
                    </svg>
                </div>
                <div class="platform-icon" data-platform="instagram" title="Instagram">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.919-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                    </svg>
                </div>
                <div class="platform-icon" data-platform="tiktok" title="TikTok">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.06-2.89-.44-4.14-1.17-.05 3.32.01 6.64-.03 9.96-.06 2.02-.63 4.16-2.12 5.56-1.63 1.54-4.06 2.02-6.19 1.55-2.22-.44-4.32-1.96-5.18-4.1-.96-2.29-.68-5.07.82-7.05 1.21-1.64 3.23-2.58 5.27-2.57v4.11c-1.36-.08-2.89.47-3.56 1.75-.41.76-.32 1.74-.1 2.53.53 1.39 2.21 2.11 3.56 1.67 1.11-.29 1.87-1.3 1.95-2.43.08-3.32-.01-6.64.03-9.96.01-1.13.01-2.26.01-3.39z" />
                    </svg>
                </div>
                <div class="platform-icon" data-platform="facebook" title="Facebook">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z" />
                    </svg>
                </div>
                <div class="platform-icon" data-platform="other" title="Any Site">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M10.59 13.41c.41.39.41 1.03 0 1.42-.39.39-1.03.39-1.42 0a5.003 5.003 0 010-7.07l3.54-3.54a5.003 5.003 0 017.07 0 5.003 5.003 0 010 7.07l-1.49 1.49c.01-.82-.12-1.64-.4-2.42l.47-.48a2.982 2.982 0 000-4.24 2.982 2.982 0 00-4.24 0l-3.53 3.53a2.982 2.982 0 000 4.24zm7.07-7.07c-.41-.39-1.03-.39-1.42 0-.39.39-.39 1.03 0 1.42a5.003 5.003 0 010 7.07l-3.54 3.54a5.003 5.003 0 01-7.07 0 5.003 5.003 0 010-7.07l1.49-1.49c-.01.82.12 1.64.4 2.42l-.47.48a2.982 2.982 0 000 4.24 2.982 2.982 0 004.24 0l3.53-3.53a2.982 2.982 0 000-4.24z" />
                    </svg>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input type="text" id="videoUrl" placeholder="Paste video link here...">
                </div>
                <button class="fetch-btn" id="fetchBtn">Fetch →</button>
            </div>
            <p id="errorMsg" style="color: #ff5555; margin-top: 25px; display: none; font-size: 14px;"></p>
        </div>
    </div>

    <!-- VIP AUTH PORTAL -->
    <div class="vip-modal-overlay" id="vipModal">
        <div class="vip-modal">
            <div class="shield-anchor">
                <div class="shield-outer">
                    <div class="shield-inner">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.5h7c-.47 4.15-3.08 7.82-7 8.91V11.5H5V6.3l7-3.11v8.31z" />
                        </svg>
                        <div class="shield-badge">!</div>
                    </div>
                    <div class="shield-pulse"></div>
                </div>
            </div>

            <div class="vip-content">
                <h2>ACTIVATE ENGINE</h2>
                <div class="vip-field">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="vipPass" placeholder="••••••••••">
                </div>
                <button class="unlock-btn" onclick="verifyVip()">UNLOCK ACCESS</button>
                <div class="cancel-link" onclick="closeVipModal()">Cancel</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
